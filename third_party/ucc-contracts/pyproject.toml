[project]
name = "ucc-contracts"
version = "0.2.0"
description = "Authoritative shared contracts (schemas, envelopes, lifecycle tables, ports) for the Unified Control Center. No domain services."
requires-python = ">=3.11"
dependencies = ["jsonschema>=4.20"]

[project.optional-dependencies]
test = ["pytest>=8"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ucc_contracts", "ucc_contracts.ports"]
